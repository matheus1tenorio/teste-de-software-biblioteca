<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Usuários - BiblioTech</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">📚 BiblioTech</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="livros.html">Livros</a></li>
                <li><a href="usuarios.html">Usuários</a></li>
                <li><a href="emprestimos.html">Empréstimos</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Gerenciamento de Usuários (Leitores)</h2>
        <section id="form-container">
            <h3 id="form-titulo">Cadastrar Novo Usuário</h3>
            <form id="usuario-form">
                <input type="text"  name="nome_usuario"  id="nome-usuario"  placeholder="Nome Completo" required>
                <input type="email" name="email_usuario" id="email-usuario" placeholder="E-mail"        required>
                <input type="text"  name="matricula"     id="matricula"     placeholder="Matrícula"
                       maxlength="8" required>
                <button type="submit" id="btn-salvar">Cadastrar Usuário</button>
                <button type="button" id="btn-cancelar"
                        onclick="cancelarEdicao()"
                        style="display:none; background-color:#95a5a6;">
                    Cancelar
                </button>
            </form>
        </section>
        <section id="lista-container">
            <h3>Usuários Ativos</h3>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Matrícula</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-clientes-body">
                    <tr><td colspan="4" style="text-align:center">Carregando...</td></tr>
                </tbody>
            </table>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 - All rights reserved</p>
    </footer>
    <script src="./js/clientes.js"></script>
</body>
</html>
